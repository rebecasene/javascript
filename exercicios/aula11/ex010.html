<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistemas de Multas</h1>
    Velociadade do carro: <input type="number" name="vel" id="vel">km/h
    <input type="button" value="Verificar" onclick="calcular()">

    <div id="res">

    </div>

    <script>
        
        function calcular() {
            let velocidade = document.getElementById('vel')
            let res = document.getElementById('res')
            let velo = Number(velocidade.value)
            res.innerHTML = `<p>Sua velocidade é de <strong>${velo}km/h</strong></p>`
           
            if (velo > 60) {
                res.innerHTML += `Você ultrapassou a velocidade permitida. MULTADO!`
            }
             res.innerHTML += '<p>Dirija sempre com o cinto de segurança!</p>'
        }
    </script>
</body>
</html>
